{% extends 'base.html' %}

{% block content %}
<h2>📰 Новости и Акции</h2>
<div style="display: flex; flex-direction: column; gap: 20px; margin-top: 20px;">
    {% for n in news %}
        <div style="padding: 20px; background: white; border-radius: 8px; border-left: 5px solid #ff4500; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0;">{{ n.title }}</h3>
            
            {% if n.image %}
                <div style="margin-bottom: 15px;">
                    <img src="{{ n.image.url }}" alt="{{ n.title }}" style="max-width: 100%; max-height: 300px; border-radius: 4px; object-fit: cover;">
                </div>
            {% endif %}
            
            <p style="color: #333; line-height: 1.5;">{{ n.text }}</p>
            
            <small style="color: #999; display: block; margin-top: 10px;">Опубликовано: {{ n.created_at|date:"d.m.Y H:i" }}</small>
        </div>
    {% empty %}
        <p>Пока новостей нет, но скоро они обязательно появятся!</p>
    {% endfor %}
</div>
{% endblock %}
